# Forecast Economy frontend — nginx

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers managed by Caddy edge proxy (not here).
    # nginx location-level add_header overrides server-level, so placing
    # them here is ineffective for SPA routes that set Cache-Control.

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml image/svg+xml;

    # Trailing slash → canonical without slash (301)
    rewrite ^(.+)/$ $1 permanent;

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(svg|png|jpg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Bot detection: social previews + search engines.
    # For social bots (Telegram, FB, Twitter, etc.) — rich link cards.
    # For search bots (Yandex, Google, Bing, etc.) — unique <title>/<meta>
    # per route to fix Yandex Webmaster «дубли title/description» warnings
    # without shipping a full SSR/prerender pipeline. The OG prerender HTML
    # is built from SEO_MAP-equivalent data on the backend.
    set $is_bot "";
    if ($http_user_agent ~* "(Twitterbot|facebookexternalhit|TelegramBot|vkShare|LinkedInBot|Slackbot|WhatsApp|Yandex[A-Z]\w*|YaDirectFetcher|Googlebot|Google-InspectionTool|GoogleOther|bingbot|DuckDuckBot|Slurp|Mail\.RU_Bot|MJ12bot|AhrefsBot|SemrushBot|DotBot|BLEXBot|Applebot|PetalBot|Bytespider|GPTBot|ClaudeBot)") {
        set $is_bot "1";
    }

    location = / {
        if ($is_bot) {
            rewrite ^/$ /og-proxy/page/home last;
        }
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/(about|privacy|compare|calculator|calendar|demographics|widgets)/?$ {
        if ($is_bot) {
            rewrite ^/(about|privacy|compare|calculator|calendar|demographics|widgets)/?$ /og-proxy/page/$1 last;
        }
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/category/([a-z0-9-]+)/?$ {
        if ($is_bot) {
            rewrite ^/category/([a-z0-9-]+)/?$ /og-proxy/category/$1 last;
        }
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/indicator/([a-z0-9-]+)/?$ {
        if ($is_bot) {
            rewrite ^/indicator/([a-z0-9-]+)/?$ /og-proxy/indicator/$1 last;
        }
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/og-proxy/indicator/([a-z0-9-]+) {
        internal;
        proxy_pass http://backend:8000/api/v1/og/indicator/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/og-proxy/category/([a-z0-9-]+) {
        internal;
        proxy_pass http://backend:8000/api/v1/og/category/$1;
        proxy_set_header Host $host;
    }

    location ~ ^/og-proxy/page/([a-z]+) {
        internal;
        proxy_pass http://backend:8000/api/v1/og/page/$1;
        proxy_set_header Host $host;
    }

    # Embed widget routes — security headers managed by Caddy edge proxy
    location ~ ^/embed/(chart|card|table|ticker|compare)(/[a-z0-9-]+)?/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Embed builder page (regular page, NOT frameable)
    location ~ ^/widgets/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Catch-all: return 404 for unknown routes (not SPA fallback)
    location / {
        try_files $uri =404;
    }
}
