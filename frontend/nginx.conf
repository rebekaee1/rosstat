# RuStats frontend — nginx
#
# ВАЖНО: whitelist маршрутов SPA должен совпадать с кодами индикаторов в backend/seed_data.py (INDICATORS).
# При добавлении нового индикатора — дописать код в regex ниже и задеплоить фронт.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Понятная страница при 404 (статус HTTP остаётся 404 — для поисковых роботов)
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    # robots.txt, sitemap.xml — short cache for crawlers
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Robots-Tag "nosnippet" always;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Hashed static assets — aggressive cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static files (favicon, og-image)
    location ~* \.(svg|png|jpg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Главная SPA — только /
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Допустимые страницы индикаторов (см. seed_data.py). Остальные /indicator/* → 404 ниже.
    location ~ ^/indicator/(cpi|cpi-food|cpi-nonfood|cpi-services|unemployment|key-rate)/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Всё остальное: реальные файлы из dist или 404 (не подмена index.html)
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
