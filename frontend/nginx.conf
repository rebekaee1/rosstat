# Forecast Economy frontend — nginx

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers for all routes
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://mc.yandex.ru; connect-src 'self' https://mc.yandex.ru; frame-src 'none'" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 512;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               application/rss+xml image/svg+xml;

    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Robots-Tag "nosnippet" always;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(svg|png|jpg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/(about|privacy|compare)/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/category/[a-z0-9-]+/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/indicator/[a-z0-9-]+/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Embed widget routes — frameable from any domain
    location ~ ^/embed/(chart|card|table|ticker|compare|calculator)(/[a-z0-9-]+)?/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "frame-ancestors *; default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Embed builder page (regular page, NOT frameable)
    location ~ ^/widgets/?$ {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Catch-all: return 404 for unknown routes (not SPA fallback)
    location / {
        try_files $uri =404;
    }
}
