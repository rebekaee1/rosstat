        <h1>Forecast Economy — бесплатная аналитика экономики России</h1>
        <p>Бесплатная аналитическая платформа: 80+ макроэкономических индикаторов России в 9 категориях — цены, ставки, финансы, ВВП, рынок труда, торговля, население, бизнес, наука.</p>
        <p><a href="/about">О проекте</a> · <a href="/privacy">Политика конфиденциальности</a></p>
        <h2>Категории</h2>
        <ul>
          <li><a href="/category/prices">Цены и инфляция</a> — ИПЦ, инфляция, еженедельные данные</li>
          <li><a href="/category/rates">Процентные ставки</a> — ключевая ставка, RUONIA, ипотека</li>
          <li><a href="/category/finance">Финансы и валюты</a> — курсы, резервы, денежная масса</li>
          <li><a href="/category/labor">Рынок труда</a> — безработица, зарплаты, занятость</li>
          <li><a href="/category/gdp">ВВП и рост</a> — ВВП, потребление, госрасходы</li>
          <li><a href="/category/population">Население</a> — демография, рождаемость, смертность</li>
          <li><a href="/category/trade">Внешняя торговля</a> — экспорт, импорт, платёжный баланс</li>
          <li><a href="/category/business">Бизнес и инвестиции</a> — ИПП, жильё, основные фонды</li>
          <li><a href="/category/science">Наука и образование</a> — аспиранты, НИР, инновации</li>
        </ul>
        <h2>О платформе</h2>
        <p>Данные загружаются автоматически из Росстата, ЦБ РФ и Минфина. Для каждого индикатора доступны: исторический ряд, график, таблица и прогноз.</p>
        <p>Источники: <a href="https://rosstat.gov.ru">Росстат</a>, <a href="https://cbr.ru">Банк России</a>, <a href="https://minfin.gov.ru">Минфин</a></p>
