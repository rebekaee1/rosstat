        <h1>RuStats — Прогноз инфляции и ИПЦ России</h1>
        <p>Аналитическая платформа прогнозирования инфляции в России на основе данных Росстата. Исторические ряды индекса потребительских цен (ИПЦ) с 1991 года и OLS-прогноз на 12 месяцев вперёд.</p>
        <h2>Индикаторы</h2>
        <ul>
          <li><a href="/indicator/cpi">Индекс потребительских цен (ИПЦ)</a> — общий индекс цен к предыдущему месяцу</li>
          <li><a href="/indicator/cpi-food">ИПЦ на продовольственные товары</a> — динамика цен на продукты питания</li>
          <li><a href="/indicator/cpi-nonfood">ИПЦ на непродовольственные товары</a> — динамика цен на непродовольственные товары</li>
          <li><a href="/indicator/cpi-services">ИПЦ на услуги</a> — динамика цен на услуги населению</li>
        </ul>
        <h2>О платформе</h2>
        <p>Данные загружаются автоматически с сайта Росстата. Прогноз строится на основе модели OLS (метод наименьших квадратов) с множественными временными окнами. Для каждого индикатора доступны: скользящая 12-месячная инфляция, помесячный ИПЦ, исторические данные и таблица прогнозных значений.</p>
        <p>Источник данных: <a href="https://rosstat.gov.ru">Росстат</a></p>
      </div>
