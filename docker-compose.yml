services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rustats
      POSTGRES_USER: rustats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rustats_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustats"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      RUSTATS_DATABASE_URL: postgresql+asyncpg://rustats:${POSTGRES_PASSWORD:-rustats_dev}@postgres:5432/rustats
      RUSTATS_REDIS_URL: redis://redis:6379/0
      RUSTATS_ROSSTAT_CA_CERT: /app/certs/russiantrustedca2024.pem
      RUSTATS_SCHEDULER_ENABLED: "true"
      RUSTATS_DEBUG: "false"
      TZ: Europe/Moscow
    volumes:
      - ./output:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
