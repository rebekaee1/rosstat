services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rustats
      POSTGRES_USER: rustats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rustats_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustats"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    environment:
      RUSTATS_DATABASE_URL: postgresql+asyncpg://rustats:${POSTGRES_PASSWORD:-rustats_dev}@postgres:5432/rustats
      RUSTATS_REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      RUSTATS_ROSSTAT_CA_CERT: /app/certs/russiantrustedca2024.pem
      RUSTATS_SCHEDULER_ENABLED: "true"
      RUSTATS_ANALYTICS_ENABLED: ${RUSTATS_ANALYTICS_ENABLED:-false}
      RUSTATS_ANALYTICS_SCHEDULER_ENABLED: ${RUSTATS_ANALYTICS_SCHEDULER_ENABLED:-false}
      RUSTATS_ANALYTICS_API_TOKEN: ${RUSTATS_ANALYTICS_API_TOKEN:-}
      RUSTATS_ANALYTICS_ALLOWED_COUNTER_IDS: ${RUSTATS_ANALYTICS_ALLOWED_COUNTER_IDS:-107136069}
      RUSTATS_ANALYTICS_ALLOWED_HOSTS: ${RUSTATS_ANALYTICS_ALLOWED_HOSTS:-forecasteconomy.com}
      RUSTATS_ANALYTICS_LIVE_WRITES_ENABLED: ${RUSTATS_ANALYTICS_LIVE_WRITES_ENABLED:-false}
      RUSTATS_YANDEX_METRIKA_READ_TOKEN: ${RUSTATS_YANDEX_METRIKA_READ_TOKEN:-}
      RUSTATS_YANDEX_METRIKA_WRITE_TOKEN: ${RUSTATS_YANDEX_METRIKA_WRITE_TOKEN:-}
      RUSTATS_YANDEX_WEBMASTER_TOKEN: ${RUSTATS_YANDEX_WEBMASTER_TOKEN:-}
      RUSTATS_DEBUG: "false"
      TZ: Europe/Moscow
    volumes:
      - ./output:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
